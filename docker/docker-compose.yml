services:
  postgres:
    image: postgres:16
    container_name: tkturners-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tkturners_accounting}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: tkturners-api
    depends_on:
      - postgres
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-tkturners_accounting}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_SSL: "false"
      CORS_ORIGIN: http://localhost:3000
      FINANCE_AUTO_SEED: ${FINANCE_AUTO_SEED:-true}
      FINANCE_WORKSPACE_NAME: ${FINANCE_WORKSPACE_NAME:-TkTurners}
      FINANCE_BASE_CURRENCY: ${FINANCE_BASE_CURRENCY:-USD}
      FINANCE_TIMEZONE: ${FINANCE_TIMEZONE:-UTC}
      FINANCE_WEB_DEFAULT_STATUS: ${FINANCE_WEB_DEFAULT_STATUS:-APPROVED}
      FINANCE_SEED_ADMIN_EMAIL_1: ${FINANCE_SEED_ADMIN_EMAIL_1:-bilal@tkturners.com}
      FINANCE_SEED_ADMIN_USERNAME_1: ${FINANCE_SEED_ADMIN_USERNAME_1:-bilal}
      FINANCE_SEED_ADMIN_PASSWORD_1: ${FINANCE_SEED_ADMIN_PASSWORD_1:-ChangeMe123!}
      FINANCE_SEED_ADMIN_EMAIL_2: ${FINANCE_SEED_ADMIN_EMAIL_2:-cofounder@tkturners.com}
      FINANCE_SEED_ADMIN_USERNAME_2: ${FINANCE_SEED_ADMIN_USERNAME_2:-cofounder}
      FINANCE_SEED_ADMIN_PASSWORD_2: ${FINANCE_SEED_ADMIN_PASSWORD_2:-ChangeMe123!}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_FINANCE_CHANNEL_ID: ${SLACK_FINANCE_CHANNEL_ID:-}
      CRON_SECRET: ${CRON_SECRET:-replace-cron-secret}
    ports:
      - "1337:1337"

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    container_name: tkturners-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:1337/api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
